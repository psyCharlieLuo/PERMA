<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PERMA 幸福感量表</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f7f6fe;color:#1a1a2e;min-height:100vh;}
.page{display:none;max-width:680px;margin:0 auto;padding:28px 18px 80px;}
.page.active{display:block;}

h1{font-size:26px;font-weight:600;color:#2d2b55;line-height:1.3;}
h2{font-size:20px;font-weight:600;color:#2d2b55;}
.sub{font-size:14px;color:#888;line-height:1.75;}
.card{background:#fff;border-radius:14px;padding:20px 24px;margin-bottom:14px;border:1px solid #eeedf8;}

.tag{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500;margin:3px;}
input[type=text],input[type=password]{width:100%;padding:10px 14px;font-size:14px;border:1px solid #ddd;border-radius:10px;outline:none;background:#fff;color:#1a1a2e;}
input:focus{border-color:#7F77DD;}

.btn{display:block;width:100%;padding:13px;font-size:15px;font-weight:500;background:#7F77DD;color:#fff;border:none;border-radius:12px;cursor:pointer;text-align:center;}
.btn:hover{background:#6b63cc;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:9px;cursor:pointer;border:none;}

.progress-bar{height:4px;background:#eeedf8;border-radius:4px;margin-bottom:20px;}
.progress-fill{height:100%;background:#7F77DD;border-radius:4px;transition:width 0.3s;}

.q-num{font-size:11px;font-weight:600;color:#9590e0;margin-bottom:8px;letter-spacing:.3px;}
.q-text{font-size:14px;line-height:1.75;color:#333;margin-bottom:14px;}

.likert-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px;}
.lk{padding:10px 2px;font-size:13px;font-weight:500;border:1px solid #e0dff5;border-radius:10px;background:#faf9ff;color:#999;cursor:pointer;text-align:center;transition:all .15s;}
.lk:hover{border-color:#7F77DD;color:#7F77DD;}
.lk.sel{background:#7F77DD;color:#fff;border-color:#7F77DD;}
.likert-ends{display:flex;justify-content:space-between;font-size:11px;color:#ccc;padding:0 2px;}

.radar-wrap{position:relative;width:100%;height:320px;}
.score-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f5f4fd;}
.score-row:last-child{border-bottom:none;}
.dbadge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.bar-wrap{flex:1;height:5px;background:#f0eff9;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.sval{font-size:15px;font-weight:600;min-width:22px;text-align:right;}
.sdesc{font-size:11px;color:#bbb;min-width:52px;}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:#f7f6fe;border-radius:12px;padding:14px;text-align:center;}
.stat-label{font-size:11px;color:#aaa;margin-bottom:5px;}
.stat-val{font-size:26px;font-weight:600;color:#7F77DD;}

table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:9px 7px;background:#f7f6fe;font-weight:500;text-align:center;font-size:11px;color:#888;}
th:first-child{text-align:left;padding-left:14px;}
td{padding:8px 7px;text-align:center;border-top:1px solid #f0eff9;font-size:12px;}
td:first-child{text-align:left;padding-left:14px;font-size:13px;}

.chip{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;}
</style>
</head>
<body>

<!-- ====== INTRO ====== -->
<div class="page active" id="page-intro">
  <div style="padding-top:12px;margin-bottom:22px;">
    <div style="margin-bottom:14px;">
      <span class="tag" style="background:#ede9fe;color:#6d28d9;">P 积极情绪</span>
      <span class="tag" style="background:#d1fae5;color:#065f46;">E 投入</span>
      <span class="tag" style="background:#fee2e2;color:#991b1b;">R 人际关系</span>
      <span class="tag" style="background:#dbeafe;color:#1e40af;">M 意义</span>
      <span class="tag" style="background:#fef3c7;color:#92400e;">A 成就</span>
    </div>
    <h1>PERMA 幸福感量表</h1>

  </div>

  <div class="card">
    <div style="font-size:13px;color:#888;margin-bottom:10px;">姓名（可选）</div>
    <input type="text" id="name-input" placeholder="输入姓名，或留空显示为"匿名"">
  </div>

  <div class="card" style="background:#fffbf0;border-color:#fde68a;font-size:13px;color:#78350f;line-height:1.7;padding:14px 18px;">
    评分说明：每题 1–7 分，<strong>1 = 完全不符合</strong>，<strong>7 = 完全符合</strong>，请根据过去一个月的真实感受作答。
  </div>

  <p style="font-size:11px;color:#ccc;margin-bottom:14px;text-align:center;">
    你的结果将与所有参与者汇总用于统计，请放心作答。
  </p>

  <button class="btn" onclick="startSurvey()">开始测评 →</button>

  <div style="margin-top:24px;text-align:center;">
    <a href="#" onclick="toggleAdmin();return false;" style="font-size:12px;color:#ccc;text-decoration:underline;">管理员入口</a>
    <div id="admin-login-box" style="display:none;margin-top:12px;">
      <div style="display:flex;gap:8px;max-width:280px;margin:0 auto;">
        <input type="password" id="admin-pw" placeholder="管理员密码" style="flex:1;font-size:13px;"
          onkeydown="if(event.key==='Enter')checkAdmin()">
        <button onclick="checkAdmin()" style="padding:10px 16px;font-size:13px;background:#7F77DD;color:#fff;border:none;border-radius:10px;cursor:pointer;">进入</button>
      </div>
    </div>
  </div>
</div>

<!-- ====== SURVEY ====== -->
<div class="page" id="page-survey">
  <div style="margin-bottom:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:13px;color:#aaa;" id="progress-text">0 / 23</span>
      <button onclick="showPage('intro')" style="font-size:12px;color:#bbb;background:none;border:none;cursor:pointer;">← 返回</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="questions-container"></div>
  <button class="btn" id="submit-btn" onclick="submitSurvey()" style="display:none;margin-top:10px;">提交并查看结果 →</button>
</div>

<!-- ====== RESULT ====== -->
<div class="page" id="page-result">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
    <div>
      <h2>你的 PERMA 幸福感</h2>
      <p class="sub" id="result-info" style="margin-top:3px;"></p>
    </div>
    <button onclick="showPage('intro')" style="font-size:12px;color:#bbb;background:none;border:none;cursor:pointer;padding:0;margin-top:4px;">重新测评</button>
  </div>

  <div class="card" style="padding:18px 20px;">
    <div class="radar-wrap"><canvas id="result-radar"></canvas></div>
  </div>

  <div class="card" id="perma-scores"></div>
  <div class="card" id="other-scores" style="background:#fafafe;border-color:#eeedf8;"></div>
</div>

<!-- ====== ADMIN ====== -->
<div class="page" id="page-admin">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2 style="margin-bottom:0;">汇总数据</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm" onclick="loadAdmin()" style="background:#ede9fe;color:#7F77DD;">刷新</button>
      <button class="btn-sm" onclick="showPage('intro')" style="background:#f0f0f0;color:#666;">← 返回</button>
    </div>
  </div>
  <div id="admin-content"><p style="text-align:center;color:#aaa;padding:4rem;">加载中...</p></div>
</div>

<script>
/* ============================================================
   CONFIGURATION — 修改此处
   ============================================================ */
const ADMIN_PASSWORD = 'permaTHU';

// JSONbin.io 配置（可选，用于多设备汇总）
// 使用步骤：
// 1. 访问 https://jsonbin.io 注册免费账号
// 2. 创建一个新的 Bin（内容设为 []）
// 3. 复制 Master Key 和 Bin ID 填入下方
const JSONBIN_KEY    = '$2a$10$3pXngsgBkQttfxIGDDtOb.V1JSs2MszoZgY/eEtMyH3Jnu29e45X2';   // 例如 $2a$10$...
const JSONBIN_BIN_ID = '69b7ff8cb7ec241ddc72a8ea';   // 例如 65abc123...

/* ============================================================
   QUESTIONS (PERMA-Profiler, Butler & Kern, 2016)
   维度映射：P=积极情绪 E=投入 R=关系 M=意义 A=成就
             N=消极情绪 L=孤独 H=身体健康 O=总体幸福感
   ============================================================ */
const QUESTIONS = [
  {id:1,  text:"你觉得自己正在朝着实现个人目标的方向上前进。",              dim:"A"},
  {id:2,  text:"你会经常全神贯注于你正在做的事情。",                        dim:"E"},
  {id:3,  text:"总体而言，你会经常感到快乐。",                              dim:"P"},
  {id:4,  text:"总体而言，你会经常感到焦虑。",                              dim:"N"},
  {id:5,  text:"你会经常实现自己设定的重要目标。",                          dim:"A"},
  {id:6,  text:"总体而言，你会经常感到积极。",                              dim:"P"},
  {id:7,  text:"总体而言，你会经常感到生气。",                              dim:"N"},
  {id:8,  text:"你经常有能力承担你的职责。",                                dim:"A"},
  {id:9,  text:"总体而言，你会经常感到悲伤。",                              dim:"N"},
  {id:10, text:"在做自己喜欢的事情时，你经常会忘记时间。",                  dim:"E"},
  {id:11, text:"总体而言，你认为你过着有目的、有意义的生活。",              dim:"M"},
  {id:12, text:"当你需要帮助的时候，你觉得你总能得到别人的帮助和支持。",    dim:"R"},
  {id:13, text:"总的来说，你觉得生活中你所做的事情是很重要和有价值的。",    dim:"M"},
  {id:14, text:"总的来说，你对事物总是感到兴奋和感兴趣。",                  dim:"E"},
  {id:15, text:"你在日常生活中总是感到孤独。",                              dim:"L"},
  {id:16, text:"你很满意你目前的身体状况。",                                dim:"H"},
  {id:17, text:"你觉得自己总被爱包围着。",                                  dim:"R"},
  {id:18, text:"你觉得自己的生活有方向感。",                                dim:"M"},
  {id:19, text:"你很满意你的人际关系。",                                    dim:"R"},
  {id:20, text:"总的来说，你对现在自己的生活感到满足。",                    dim:"P"},
  {id:21, text:"与同龄和同性别的人相比，你认为你的健康状况优秀。",          dim:"H"},
  {id:22, text:"总体而言，你认为你的健康状况优秀。",                        dim:"H"},
  {id:23, text:"综合考虑所有因素，你觉得自己非常幸福。",                    dim:"O"},
];

const DIMS = {
  P:{label:"积极情绪", color:"#7F77DD", light:"#ede9fe"},
  E:{label:"投入",     color:"#1D9E75", light:"#d1fae5"},
  R:{label:"人际关系", color:"#D85A30", light:"#fee2e2"},
  M:{label:"意义",     color:"#378ADD", light:"#dbeafe"},
  A:{label:"成就",     color:"#BA7517", light:"#fef3c7"},
  N:{label:"消极情绪", color:"#E24B4A", light:"#fce8e8"},
  L:{label:"孤独感",   color:"#888",    light:"#f0f0f0"},
  H:{label:"身体健康", color:"#059669", light:"#d1fae5"},
  O:{label:"总体幸福感",color:"#7F77DD", light:"#ede9fe"},
};

const PERMA_KEYS  = ['P','E','R','M','A'];
const OTHER_KEYS  = ['N','L','H','O'];
const LIKERT_LOW  = '完全不符合';
const LIKERT_HIGH = '完全符合';

/* ============================================================
   STATE
   ============================================================ */
let answers = {};
let currentName = '';
let resultChart = null;
let adminChart  = null;

/* ============================================================
   NAVIGATION
   ============================================================ */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function toggleAdmin() {
  const b = document.getElementById('admin-login-box');
  b.style.display = b.style.display === 'none' ? 'block' : 'none';
}

function checkAdmin() {
  if (document.getElementById('admin-pw').value === ADMIN_PASSWORD) {
    showPage('admin');
    loadAdmin();
  } else {
    alert('密码错误');
  }
}

/* ============================================================
   SURVEY
   ============================================================ */
function startSurvey() {
  currentName = (document.getElementById('name-input').value.trim()) || '匿名';
  answers = {};
  renderQuestions();
  showPage('survey');
  updateProgress();
}

function renderQuestions() {
  const c = document.getElementById('questions-container');
  c.innerHTML = '';
  QUESTIONS.forEach(q => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML =
      `<div class="q-num">Q${q.id}</div>` +
      `<div class="q-text">${q.text}</div>` +
      `<div class="likert-wrap" id="lk-${q.id}">` +
        [1,2,3,4,5,6,7].map(v =>
          `<button class="lk" onclick="setAns(${q.id},${v},this)">${v}</button>`
        ).join('') +
      `</div>` +
      `<div class="likert-ends"><span>${LIKERT_LOW}</span><span>${LIKERT_HIGH}</span></div>`;
    c.appendChild(d);
  });
}

function setAns(qid, val, btn) {
  answers[qid] = val;
  document.getElementById('lk-' + qid).querySelectorAll('.lk')
    .forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  updateProgress();
  const done = Object.keys(answers).length;
  document.getElementById('submit-btn').style.display =
    done === QUESTIONS.length ? 'block' : 'none';
}

function updateProgress() {
  const n = Object.keys(answers).length;
  document.getElementById('progress-text').textContent = `${n} / 23`;
  document.getElementById('progress-fill').style.width = Math.round(n/23*100) + '%';
}

/* ============================================================
   SCORING
   ============================================================ */
function calcScores() {
  const scores = {};
  [...PERMA_KEYS, ...OTHER_KEYS].forEach(d => {
    const qs = QUESTIONS.filter(q => q.dim === d);
    if (!qs.length) return;
    scores[d] = Math.round(
      qs.reduce((s, q) => s + (answers[q.id] || 4), 0) / qs.length * 10
    ) / 10;
  });
  return scores;
}

function permaAvg(scores) {
  return Math.round(PERMA_KEYS.reduce((s,d) => s + (scores[d]||0), 0) / 5 * 10) / 10;
}

function scoreDesc(s) {
  return s >= 6.5 ? '非常出色' : s >= 5.5 ? '良好' : s >= 4 ? '中等' : s >= 2.5 ? '有待提升' : '需关注';
}

/* ============================================================
   SUBMIT
   ============================================================ */
async function submitSurvey() {
  if (Object.keys(answers).length < 23) {
    alert('请回答全部 23 道题再提交。');
    return;
  }
  const btn = document.getElementById('submit-btn');
  btn.textContent = '提交中...'; btn.disabled = true;

  const scores = calcScores();
  const entry = { name: currentName, scores, timestamp: new Date().toISOString() };

  // localStorage (always)
  try {
    const key = 'perma_' + Date.now();
    localStorage.setItem(key, JSON.stringify(entry));
  } catch(e) {}

  // JSONbin (if configured)
  if (JSONBIN_KEY && JSONBIN_BIN_ID) {
    try { await jsonbinAppend(entry); } catch(e) { console.warn('JSONbin:', e); }
  }

  btn.textContent = '提交并查看结果 →'; btn.disabled = false;
  showResult(scores);
}

/* ============================================================
   RESULT
   ============================================================ */
function showResult(scores) {
  document.getElementById('result-info').textContent =
    new Date().toLocaleDateString('zh-CN') + ' · ' + currentName;

  // Radar
  if (resultChart) resultChart.destroy();
  resultChart = makeRadar(
    'result-radar',
    PERMA_KEYS.map(d => DIMS[d].label),
    PERMA_KEYS.map(d => scores[d]),
    '#7F77DD', 'rgba(127,119,221,0.18)'
  );

  // PERMA scores
  const pa = document.getElementById('perma-scores');
  pa.innerHTML =
    `<div style="font-size:13px;font-weight:500;color:#555;margin-bottom:14px;">PERMA 五大维度</div>` +
    PERMA_KEYS.map(d => scoreRowHTML(d, scores[d])).join('') +
    `<div style="display:flex;justify-content:space-between;align-items:center;
      margin-top:14px;padding-top:12px;border-top:2px solid #f5f4fd;">
      <span style="font-size:13px;color:#aaa;">PERMA 均分</span>
      <span style="font-size:20px;font-weight:600;color:#7F77DD;">${permaAvg(scores)} <span style="font-size:13px;color:#ccc;">/ 7</span></span>
    </div>`;

  // Other scores
  const oa = document.getElementById('other-scores');
  oa.innerHTML =
    `<div style="font-size:13px;font-weight:500;color:#555;margin-bottom:14px;">其他维度参考</div>` +
    OTHER_KEYS.map(d => {
      if (!scores[d]) return '';
      const neg = d === 'N' || d === 'L';
      return scoreRowHTML(d, scores[d], neg ? '（得分越低越好）' : '');
    }).join('');

  showPage('result');
}

function scoreRowHTML(d, s, note='') {
  const pct = Math.round((s-1)/6*100);
  return `
  <div class="score-row">
    <div class="dbadge" style="background:${DIMS[d].color}">${d}</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;color:#333;margin-bottom:5px;">
        ${DIMS[d].label}
        <span style="font-size:11px;color:#bbb;margin-left:4px;">${note}</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pct}%;background:${DIMS[d].color}"></div>
      </div>
    </div>
    <div class="sval" style="color:${DIMS[d].color}">${s}</div>
    <div class="sdesc">${scoreDesc(s)}</div>
  </div>`;
}

/* ============================================================
   ADMIN
   ============================================================ */
async function loadAdmin() {
  document.getElementById('admin-content').innerHTML =
    '<p style="text-align:center;color:#aaa;padding:4rem;">加载中...</p>';

  let all = [];

  // localStorage
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('perma_')) {
        const v = JSON.parse(localStorage.getItem(k));
        if (v) all.push(v);
      }
    }
  } catch(e) {}

  // JSONbin
  if (JSONBIN_KEY && JSONBIN_BIN_ID) {
    try {
      const remote = await jsonbinFetch();
      all = [...all, ...remote];
    } catch(e) {}
  }

  // Deduplicate by timestamp
  const seen = new Set();
  all = all.filter(r => {
    if (seen.has(r.timestamp)) return false;
    seen.add(r.timestamp); return true;
  }).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  renderAdmin(all);
}

function renderAdmin(data) {
  const el = document.getElementById('admin-content');
  if (!data.length) {
    el.innerHTML = '<p style="text-align:center;color:#aaa;padding:4rem;">暂无数据，等待参与者完成测评。</p>';
    return;
  }

  const avg = d => Math.round(data.reduce((s,r) => s+(r.scores[d]||0), 0) / data.length * 10) / 10;
  const groupAvg = Math.round(PERMA_KEYS.reduce((s,d) => s+avg(d), 0)/5*10)/10;
  const strongDim = PERMA_KEYS.reduce((a,b) => avg(a) > avg(b) ? a : b);

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">填写人数</div>
        <div class="stat-val">${data.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">群体 PERMA 均分</div>
        <div class="stat-val">${groupAvg}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">最强维度</div>
        <div class="stat-val" style="font-size:17px;">${DIMS[strongDim].label}</div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:13px;font-weight:500;color:#555;margin-bottom:4px;">群体 PERMA 均值雷达图</div>
      <div style="position:relative;width:100%;height:280px;">
        <canvas id="admin-radar"></canvas>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:16px 20px 12px;border-bottom:1px solid #f5f4fd;">
        <span style="font-size:13px;font-weight:500;color:#555;">个人明细（${data.length} 人）</span>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th>姓名</th>
            ${PERMA_KEYS.map(d=>`<th style="color:${DIMS[d].color}">${DIMS[d].label}</th>`).join('')}
            <th>消极情绪</th><th>孤独感</th><th>健康</th><th>总体</th>
            <th>PERMA均</th><th>日期</th>
          </tr></thead>
          <tbody>
            ${data.map(r => `<tr>
              <td>${r.name}</td>
              ${PERMA_KEYS.map(d=>`<td style="color:${DIMS[d].color};font-weight:500">${r.scores[d]||'—'}</td>`).join('')}
              <td>${r.scores.N||'—'}</td>
              <td>${r.scores.L||'—'}</td>
              <td>${r.scores.H||'—'}</td>
              <td>${r.scores.O||'—'}</td>
              <td style="font-weight:600;color:#7F77DD">${permaAvg(r.scores)}</td>
              <td style="color:#ccc;">${new Date(r.timestamp).toLocaleDateString('zh-CN')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  if (adminChart) adminChart.destroy();
  adminChart = makeRadar(
    'admin-radar',
    PERMA_KEYS.map(d => DIMS[d].label),
    PERMA_KEYS.map(d => avg(d)),
    '#1D9E75', 'rgba(29,158,117,0.15)'
  );
}

/* ============================================================
   CHART HELPER
   ============================================================ */
function makeRadar(canvasId, labels, data, color, fill) {
  return new Chart(document.getElementById(canvasId), {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: fill,
        pointBackgroundColor: color,
        pointRadius: 5,
        borderWidth: 2,
        pointHoverRadius: 7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          min: 1, max: 7, ticks: { stepSize: 1, font: { size: 9 }, color: '#aaa' },
          grid: { color: '#eeedf8' },
          pointLabels: { font: { size: 12 }, color: '#666' },
          angleLines: { color: '#eeedf8' },
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

/* ============================================================
   JSONBIN HELPERS
   ============================================================ */
async function jsonbinFetch() {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false' }
  });
  const d = await r.json();
  return Array.isArray(d) ? d : (d.record ? d.record : []);
}

async function jsonbinAppend(entry) {
  let arr = [];
  try { arr = await jsonbinFetch(); } catch(e) {}
  arr.push(entry);
  await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_KEY,
      'X-Bin-Versioning': 'false',
    },
    body: JSON.stringify(arr)
  });
}
